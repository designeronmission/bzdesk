    <link rel="shortcut icon" type="image/png" href="images/logo/fav-icon.png" />

    <link rel="stylesheet" href="assets/css/animate.min.css" />
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/font-awesome-pro.min.css" />
    <link rel="stylesheet" href="assets/css/flaticon_bzdesk.css" />
    <link rel="stylesheet" href="assets/css/nice-select.css" />
    <link rel="stylesheet" href="assets/css/backToTop.css" />
    <link rel="stylesheet" href="assets/css/owl.carousel.min.css" />
    <link rel="stylesheet" href="assets/css/swiper.min.css" />
    <link rel="stylesheet" href="assets/css/odometer-theme-default.css" />
    <link rel="stylesheet" href="assets/css/magnific-popup.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/bzdesk-main.css" />
    <link rel="stylesheet" href="assets/css/meanmenu.css" />

    <!-- Intl Tel Input CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css" />

    <style>
    
#conName-error{
    color: #ee1f24;
    text-align: left;
    justify-content: center;
    width: 100%;
    margin-top: 10px;
}
#conEmail-error{
    color: #ee1f24;
    text-align: left;
    justify-content: center;
    width: 100%;
    margin-top: 10px;
}
#conPhone-error{
    color: #ee1f24;
    text-align: left;
    justify-content: center;
    width: 100%;
    margin-top: 10px;
}
#conMessage-error{
    color: #ee1f24;
    text-align: left;
    justify-content: center;
    width: 100%;
    margin-top: 10px;
}




        /* Validation Styles */
        .input-boxes .form_group {
            position: relative;
            margin-bottom: 5px;
        }
        
        
        .input-boxes .form_group input.valid,
        .input-boxes .form_group textarea.valid {
            border-color: #28a745;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.15);
        }
        
        
        .form-feedback {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
            font-weight: 500;
        }
        
        .form-feedback.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .form-feedback.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
    </style>
</head>

<body>
    <main class="site-content" id="content">
        <section class="contact">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12 col-md-12 signup-form">
                        <div class="contact-form-box glass-card">
                            <h3>Request a Demo</h3>

                            <div id="form-feedback" class="form-feedback"></div>

                            <div class="bz-contact-form">
                                <form id="contact-form" novalidate>
                                    <div class="row gx-3">
                                        <div class="col-sm-4 input-boxes">
                                            <div class="form_group">
                                                <input type="text" name="conName" id="conName" placeholder="Full name" autocomplete="name" />
                                                <span class="error-message" id="conName-error"></span>
                                            </div>
                                        </div>

                                        <div class="col-sm-4 input-boxes">
                                            <div class="form_group">
                                                <input type="email" name="conEmail" id="conEmail" placeholder="Email address" autocomplete="email" />
                                                <span class="error-message" id="conEmail-error"></span>
                                            </div>
                                        </div>

                                        <div class="col-sm-4 input-boxes">
                                            <div class="form_group phone-input-container">
                                                <input type="tel" name="conPhone" id="conPhone" placeholder="Phone number" autocomplete="tel" />
                                                <span class="error-message" id="conPhone-error"></span>
                                            </div>
                                        </div>

                                        <div class="col-sm-12 input-boxes">
                                            <div class="form_group">
                                                <textarea name="conMessage" id="conMessage" placeholder="Tell us about your business needs..." rows="4"></textarea>
                                                <span class="error-message" id="conMessage-error"></span>
                                            </div>
                                        </div>

                                        <div class="col-12">
                                            <div class="form_btn">
                                                <button type="submit" class="btn">Send Message</button>
                                            </div>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"></script>

    <script>
        (function() {
            'use strict';

            // Initialize phone input
            const phoneInput = document.getElementById('conPhone');
            let iti;
            
            try {
                iti = window.intlTelInput(phoneInput, {
                    initialCountry: 'auto',
                    geoIpLookup: function(callback) {
                        fetch('https://ipapi.co/json/')
                            .then(function(res) { return res.json(); })
                            .then(function(data) { callback(data.country_code); })
                            .catch(function() { callback('us'); });
                    },
                    separateDialCode: true,
                    preferredCountries: ['us', 'gb', 'in', 'ca', 'au', 'de', 'fr'],
                    utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"
                });
            } catch(e) {
                console.warn("IntlTelInput error:", e);
            }

            const form = document.getElementById('contact-form');
            const feedbackDiv = document.getElementById('form-feedback');

            const nameInput = document.getElementById('conName');
            const emailInput = document.getElementById('conEmail');
            const messageInput = document.getElementById('conMessage');

            const nameError = document.getElementById('conName-error');
            const emailError = document.getElementById('conEmail-error');
            const phoneError = document.getElementById('conPhone-error');
            const messageError = document.getElementById('conMessage-error');

            function clearInputState(input, errorSpan) {
                input.classList.remove('error', 'valid');
                if (errorSpan) {
                    errorSpan.textContent = '';
                    errorSpan.classList.remove('show');
                }
            }

            function showError(inputElement, errorElement, message) {
                inputElement.classList.add('error');
                inputElement.classList.remove('valid');
                errorElement.textContent = message;
                errorElement.classList.add('show');
            }

            function showSuccess(inputElement, errorElement) {
                inputElement.classList.remove('error');
                inputElement.classList.add('valid');
                if (errorElement) {
                    errorElement.textContent = '';
                    errorElement.classList.remove('show');
                }
            }

            function validateName() {
                const val = nameInput.value.trim();
                if (!val) {
                    showError(nameInput, nameError, 'Full name is required');
                    return false;
                }
                if (val.length < 2) {
                    showError(nameInput, nameError, 'Name must be at least 2 characters');
                    return false;
                }
                showSuccess(nameInput, nameError);
                return true;
            }

            function validateEmail() {
                const val = emailInput.value.trim();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!val) {
                    showError(emailInput, emailError, 'Email address is required');
                    return false;
                }
                if (!emailRegex.test(val)) {
                    showError(emailInput, emailError, 'Enter a valid email address');
                    return false;
                }
                showSuccess(emailInput, emailError);
                return true;
            }

            function validatePhone() {
                const val = phoneInput.value.trim();
                if (!val) {
                    showError(phoneInput, phoneError, 'Phone number is required');
                    return false;
                }
                if (iti && typeof iti.isValidNumber === 'function') {
                    if (!iti.isValidNumber()) {
                        showError(phoneInput, phoneError, 'Enter a valid phone number');
                        return false;
                    }
                } else if (val.length < 5) {
                    showError(phoneInput, phoneError, 'Enter a valid phone number');
                    return false;
                }
                showSuccess(phoneInput, phoneError);
                return true;
            }

            function validateMessage() {
                const val = messageInput.value.trim();
                if (!val) {
                    showError(messageInput, messageError, 'Message is required');
                    return false;
                }
                if (val.length < 10) {
                    showError(messageInput, messageError, 'Please provide more details');
                    return false;
                }
                showSuccess(messageInput, messageError);
                return true;
            }

            // Real-time validation on input
            nameInput.addEventListener('input', function() {
                clearInputState(nameInput, nameError);
                validateName();
            });
            
            emailInput.addEventListener('input', function() {
                clearInputState(emailInput, emailError);
                validateEmail();
            });
            
            phoneInput.addEventListener('input', function() {
                clearInputState(phoneInput, phoneError);
                validatePhone();
            });
            
            messageInput.addEventListener('input', function() {
                clearInputState(messageInput, messageError);
                validateMessage();
            });

            // Form submission
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                // Clear previous feedback
                feedbackDiv.classList.remove('success', 'error');
                feedbackDiv.style.display = 'none';
                feedbackDiv.textContent = '';

                // Validate all fields
                const isNameValid = validateName();
                const isEmailValid = validateEmail();
                const isPhoneValid = validatePhone();
                const isMessageValid = validateMessage();

                if (!isNameValid) {
                    feedbackDiv.textContent = 'Please enter your full name';
                    feedbackDiv.classList.add('error');
                    feedbackDiv.style.display = 'block';
                    nameInput.focus();
                    return;
                }
                
                if (!isEmailValid) {
                    feedbackDiv.textContent = 'Please enter a valid email address';
                    feedbackDiv.classList.add('error');
                    feedbackDiv.style.display = 'block';
                    emailInput.focus();
                    return;
                }
                
                if (!isPhoneValid) {
                    feedbackDiv.textContent = 'Please enter a valid phone number';
                    feedbackDiv.classList.add('error');
                    feedbackDiv.style.display = 'block';
                    phoneInput.focus();
                    return;
                }
                
                if (!isMessageValid) {
                    feedbackDiv.textContent = 'Please enter your message';
                    feedbackDiv.classList.add('error');
                    feedbackDiv.style.display = 'block';
                    messageInput.focus();
                    return;
                }

                // Get full phone number
                let fullPhoneNumber = phoneInput.value.trim();
                let countryCode = '';
                if (iti && typeof iti.getNumber === 'function') {
                    fullPhoneNumber = iti.getNumber();
                    const countryData = iti.getSelectedCountryData();
                    countryCode = countryData.dialCode;
                }

                // Success message
                feedbackDiv.textContent = 'Thank you! Your demo request has been submitted successfully. We will contact you soon.';
                feedbackDiv.classList.add('success');
                feedbackDiv.style.display = 'block';

                console.log('Demo request submitted:', {
                    name: nameInput.value.trim(),
                    email: emailInput.value.trim(),
                    phone: fullPhoneNumber,
                    countryCode: countryCode,
                    message: messageInput.value.trim()
                });

                // Reset form
                form.reset();
                if (iti && typeof iti.setNumber === 'function') {
                    iti.setNumber('');
                } else if (phoneInput) {
                    phoneInput.value = '';
                }
                
                // Remove validation classes
                [nameInput, emailInput, phoneInput, messageInput].forEach(input => {
                    if (input) input.classList.remove('valid', 'error');
                });
                
                // Clear error messages
                [nameError, emailError, phoneError, messageError].forEach(err => {
                    if (err) {
                        err.textContent = '';
                        err.classList.remove('show');
                    }
                });

                feedbackDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                // Auto hide success message
                setTimeout(() => {
                    if (feedbackDiv.classList.contains('success')) {
                        feedbackDiv.style.opacity = '0';
                        setTimeout(() => {
                            feedbackDiv.style.display = 'none';
                            feedbackDiv.style.opacity = '';
                        }, 300);
                    }
                }, 6000);
            });
        })();
    </script>
</body>

</html>
